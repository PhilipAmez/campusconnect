<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peerloom Notifications</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #ffffff; /* Light theme */
      --bg-secondary: rgba(255, 255, 255, 0.7); /* Enhanced glass bg */
      --text-primary: #000000; /* Black in light mode */
      --text-secondary: #555555;
      --accent: #3498db;
      --accent-secondary: #5dade2;
      --border: rgba(0, 0, 0, 0.03);
      --blur: 20px;
      --unread-dot: #e74c3c;
      --switch-bg: #bdc3c7;
      --switch-thumb: #ffffff;
      --transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      --glass-gradient: linear-gradient(to right, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4)); /* Horizontal gradient, no diagonal */
      --glass-bg: rgba(255, 255, 255, 0.8);
    }
    body.dark {
      --bg-primary: #2c3e50;
      --bg-secondary: rgba(44, 62, 80, 0.7);
      --text-primary: #ffffff;
      --text-secondary: #bdc3c7;
      --border: rgba(255, 255, 255, 0.03);
      --switch-bg: #34495e;
      --switch-thumb: #3498db;
      --glass-gradient: linear-gradient(to right, rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.4));
      --glass-bg: rgba(44, 62, 80, 0.8);
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-primary); /* Plain background, no lines or patterns */
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }
    .notifications-container {
      max-width: 600px;
      width: 100%;
      background: transparent;
      border-radius: 16px;
      overflow: hidden;
      margin: 20px 0;
      box-shadow: var(--shadow);
      transition: box-shadow var(--transition);
    }
    .header {
      padding: 20px;
      background: var(--glass-gradient);
      backdrop-filter: blur(var(--blur));
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 12px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 18px;
      padding: 8px;
      border-radius: 8px;
      transition: background var(--transition), transform 0.1s;
    }
    .back-btn:hover {
      background: rgba(52, 152, 219, 0.1);
    }
    .back-btn:active {
      transform: scale(0.95);
    }
    .title {
      margin: 0;
      font-size: 24px;
      user-select: none;
      touch-action: pan-y;
    }
    .header-actions {
      display: flex;
      gap: 12px;
    }
    .header-actions button, .settings-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background var(--transition), transform 0.1s;
    }
    .header-actions button:hover, .settings-btn:hover {
      background: rgba(52, 152, 219, 0.1);
    }
    .header-actions button:active {
      transform: scale(0.95);
    }
    .tabs-wrapper {
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      width: 100%;
      display: flex;
      justify-content: flex-start;
      touch-action: pan-x; /* Ensure horizontal swipe only */
    }
    .tabs-wrapper::-webkit-scrollbar {
      display: none;
    }
    .tabs {
      display: flex;
      gap: 8px;
      background: var(--glass-gradient);
      border-radius: 24px;
      padding: 4px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
      min-width: max-content;
      position: relative;
      user-select: none;
    }
    .tab {
      cursor: pointer;
      padding: 10px 20px;
      border-radius: 20px;
      background: transparent;
      color: var(--text-secondary);
      font-weight: 500;
      transition: color var(--transition);
      white-space: nowrap;
      z-index: 1;
    }
    .tab.active {
      color: white;
    }
    .pill {
      position: absolute;
      top: 4px;
      bottom: 4px;
      border-radius: 20px;
      background: var(--accent);
      box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
      transition: left var(--transition), width var(--transition);
    }
    .ripple {
      position: absolute;
      background: var(--accent-secondary);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      animation: ripple-effect 0.5s ease-out;
      opacity: 0.3;
    }
    @keyframes ripple-effect {
      to {
        transform: translate(-50%, -50%) scale(10);
        opacity: 0;
      }
    }
    .notification-list {
      padding: 20px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    /* Staggered entry animation for list items */
    @keyframes slideInItem {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .notification-item {
      animation: slideInItem 0.25s ease both;
    }
    .notification-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      margin-bottom: 10px;
      border-radius: 14px;
      background: var(--glass-gradient);
      backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, opacity 0.2s ease;
      cursor: pointer;
      position: relative;
      opacity: 1;
    }
    .notification-item:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }
    .notification-item:active {
      transform: scale(0.98);
    }
    /* Unread: left accent bar + subtle highlight background */
    .notification-item.unread {
      border-left: 3px solid var(--unread-dot);
      padding-left: 13px;
    }
    body.dark .notification-item.unread {
      background: linear-gradient(to right, rgba(231,76,60,0.10), rgba(44, 62, 80, 0.55));
    }
    body:not(.dark) .notification-item.unread {
      background: linear-gradient(to right, rgba(231,76,60,0.06), rgba(255,255,255,0.70));
    }
    .notification-item.unread::before {
      content: '';
      width: 9px;
      height: 9px;
      background: var(--unread-dot);
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(231,76,60,0.5);
      animation: pulseDot 2s infinite;
    }
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.35); opacity: 0.7; }
    }
    /* Read items: slightly dimmed */
    .notification-item:not(.unread) {
      opacity: 0.78;
    }
    .notification-item:not(.unread):hover {
      opacity: 1;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-right: 16px;
      background: #bdc3c7;
      object-fit: cover;
      flex-shrink: 0;
    }
    .content {
      flex: 1;
    }
    .content p {
      margin: 0;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text-primary);
    }
    .timestamp {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .load-more {
      display: block;
      margin: 0 auto 20px;
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 500;
      position: relative;
      overflow: hidden;
      transition: background var(--transition), transform var(--transition);
    }
    .load-more:hover {
      transform: scale(1.05);
    }
    .load-more:active {
      transform: scale(0.95);
    }
    /* Settings Panel */
    .settings-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
      backdrop-filter: blur(6px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .settings-panel.visible {
      opacity: 1;
    }
    .settings-content {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--blur));
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 420px;
      width: 92%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      transform: scale(0.93) translateY(18px);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
      max-height: 90vh;
      overflow-y: auto;
    }
    .settings-panel.visible .settings-content {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
    .settings-content:hover {
      transform: scale(1.005);
    }
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 20px;
      color: var(--text-primary);
    }
    .close-btn {
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: color var(--transition), transform 0.1s;
    }
    .close-btn:hover {
      color: var(--text-primary);
    }
    .close-btn:active {
      transform: scale(0.9);
    }
    .settings-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      transition: background var(--transition);
    }
    .settings-item:hover {
      background: rgba(52, 152, 219, 0.06);
      border-radius: 8px;
    }
    .toggle {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--switch-bg);
      transition: var(--transition);
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 2px;
      bottom: 2px;
      background-color: var(--switch-thumb);
      transition: var(--transition);
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--accent);
    }
    input:checked + .slider:before {
      transform: translateX(24px);
    }

    /* Mobile Bottom Nav Styles */
    .mobile-bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        border-top: 1px solid rgba(255,255,255,0.1);
        display: none;
        justify-content: space-evenly;
        align-items: center;
        padding: 0.3rem 0 calc(0.3rem + env(safe-area-inset-bottom, 0));
        z-index: 1001;
    }
    .mobile-bottom-nav a {
        color: var(--text-primary);
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 0.6rem;
        opacity: 0.7;
        transition: opacity 0.2s ease, color 0.2s ease;
    }
    .mobile-bottom-nav a i { font-size: 1.1rem; margin-bottom: 0.1rem; }
    .mobile-bottom-nav a:hover,
    .mobile-bottom-nav a.active {
        opacity: 1;
        color: var(--accent);
    }
    .mobile-bottom-nav a.active i {
        transform: scale(1.1);
    }
    .mobile-bottom-nav a.active span {
        font-weight: 600;
    }
    .nav-icon { position: relative; }
    .notification-badge {
        position: absolute;
        top: -2px; right: -4px;
        width: 8px; height: 8px;
        background: var(--unread-dot);
        border-radius: 50%;
        display: none;
    }
    .notification-badge.visible { display: block; }

    /* Mobile */
    @media (max-width: 600px) {
      .header {
        padding: 16px;
      }
      .tabs-wrapper {
        justify-content: center;
        overflow: hidden; /* Prevent cutting corners */
      }
      .tabs {
        background: none;
        padding: 0;
        box-shadow: none;
        width: 100%; /* Full width for mobile swipe */
      }
      .tab {
        padding: 12px 16px;
        flex: 1; /* Equal spacing */
        text-align: center;
      }
      .header-actions {
        justify-content: flex-end;
      }
      .notification-list {
        padding: 16px;
      }
      .settings-panel {
        align-items: flex-end;
      }
      .settings-content {
        border-radius: 16px 16px 0 0;
        width: 100%;
        max-width: none;
        transform: none;
      }
      .mobile-bottom-nav {
          display: flex;
      }
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(100%);
      }
    }

    /* Global Toast Notification Styles */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: var(--glass-gradient);
      backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      color: var(--text-primary);
      pointer-events: auto;
      animation: slideInToast 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 280px;
    }
    @keyframes slideInToast {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="notifications-container">
    <div class="header">
      <div class="header-top">
        <div class="header-left">
          <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
          <h2 class="title" id="title">Notifications</h2>
        </div>
        <div class="header-actions">
          <button id="markAllReadBtn">Mark All Read</button>
          <button id="clearAllBtn">Clear All</button>
          <button class="settings-btn" id="openSettingsBtn">⚙️</button>
        </div>
      </div>
      <div class="tabs-wrapper" id="tabs-wrapper">
        <div class="tabs" id="tabs">
          <div class="tab active" data-tab="all">All</div>
          <div class="tab" data-tab="new_group_message">Messages</div>
          <div class="tab" data-tab="new_follower">Followers</div>
          <div class="tab" data-tab="new_post">Posts</div>
          <div class="tab" data-tab="new_comment">Comments</div>
          <div class="pill" id="pill"></div>
        </div>
      </div>
    </div>
    <div class="notification-list" id="notification-list">
      <!-- Dynamically populated -->
    </div>
    <button class="load-more" id="loadMoreBtn">Load More</button>
  </div>

  <!-- Mobile Bottom Navigation -->
  <div class="mobile-bottom-nav">
      <a href="dashboard.html">
          <i class="fas fa-home"></i>
          <span>Home</span>
      </a>
      <a href="feed.html">
          <i class="fas fa-scroll"></i>
          <span>Skrolz</span>
      </a>
      <a href="notifications.html" class="nav-icon active">
          <i class="fas fa-bell"></i>
          <span class="notification-badge"></span>
          <span>Activity</span>
      </a>
      <a href="profile.html">
          <i class="fas fa-user"></i>
          <span>Profile</span>
      </a>
  </div>

<!-- Settings Panel -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-content">
      <div class="settings-header">
        <h3>Notification Settings</h3>
        <span class="close-btn" id="closeSettingsBtn">×</span>
      </div>
      <div class="settings-item">
        <span>Group Messages</span>
        <label class="toggle">
          <input type="checkbox" data-pref="group_message" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-item">
        <span>New Followers</span>
        <label class="toggle">
          <input type="checkbox" data-pref="follower" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-item">
        <span>Follower Posts</span>
        <label class="toggle">
          <input type="checkbox" data-pref="follower_post" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-item">
        <span>Post Comments</span>
        <label class="toggle">
          <input type="checkbox" data-pref="comment" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-item">
        <span>Email Notifications</span>
        <label class="toggle">
          <input type="checkbox" data-pref="email">
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-item">
        <span>Sound Alerts</span>
        <label class="toggle">
          <input type="checkbox" data-pref="sound" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-item">
        <span>Push Notifications</span>
        <label class="toggle">
          <input type="checkbox" data-pref="push" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-item">
        <span>Vibration on Alert</span>
        <label class="toggle">
          <input type="checkbox" data-pref="vibration">
          <span class="slider"></span>
        </label>
      </div>
      <div class="settings-item">
        <span>Do Not Disturb Mode</span>
        <label class="toggle">
          <input type="checkbox" data-pref="dnd">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Container for Global Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import { supabase } from './js/supabaseClient.js';

    /* ─────────────────────────────────────────────────────
       STATE
    ───────────────────────────────────────────────────── */
    let currentUser   = null;
    let notifications = [];    // full list fetched from DB
    let activeTab     = 'all';
    let offset        = 0;
    const PAGE_SIZE   = 20;
    let isFetching    = false;

    /* ─────────────────────────────────────────────────────
       DOM REFS
    ───────────────────────────────────────────────────── */
    const listEl          = document.getElementById('notification-list');
    const markAllBtn      = document.getElementById('markAllReadBtn');
    const clearAllBtn     = document.getElementById('clearAllBtn');
    const loadMoreBtn     = document.getElementById('loadMoreBtn');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const closeSettingsBtn= document.getElementById('closeSettingsBtn');
    const settingsPanel   = document.getElementById('settings-panel');
    const tabs            = document.querySelectorAll('.tab');
    const pill            = document.getElementById('pill');
    const toastContainer  = document.getElementById('toast-container');

    /* ─────────────────────────────────────────────────────
       TOAST
    ───────────────────────────────────────────────────── */
    function showToast(msg, icon = 'fa-info-circle', color = '#3498db') {
      const t = document.createElement('div');
      t.className = 'toast';
      t.innerHTML = `<i class="fas ${icon}" style="color:${color};font-size:1.2rem;"></i><span>${msg}</span>`;
      toastContainer.appendChild(t);
      setTimeout(() => { if (toastContainer.contains(t)) toastContainer.removeChild(t); }, 4000);
    }

    /* ─────────────────────────────────────────────────────
       SETTINGS — persist toggles to localStorage
    ───────────────────────────────────────────────────── */
    const PREFS_KEY = 'peerloom_notif_prefs';

    function loadPrefs() {
      try { return JSON.parse(localStorage.getItem(PREFS_KEY)) || {}; } catch { return {}; }
    }
    function savePrefs(prefs) {
      localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
    }

    function initSettingsToggles() {
      const prefs = loadPrefs();
      document.querySelectorAll('.settings-item input[data-pref]').forEach(input => {
        const key = input.dataset.pref;
        // Load stored value; if missing fall back to the HTML default (checked attr)
        if (key in prefs) {
          input.checked = prefs[key];
        }
        input.addEventListener('change', () => {
          const updated = loadPrefs();
          updated[key] = input.checked;
          savePrefs(updated);
          showToast(
            `${input.checked ? 'Enabled' : 'Disabled'}: ${input.closest('.settings-item').querySelector('span').textContent}`,
            input.checked ? 'fa-check-circle' : 'fa-times-circle',
            input.checked ? '#2ecc71' : '#e74c3c'
          );
        });
      });
    }

    /* ─────────────────────────────────────────────────────
       SETTINGS PANEL OPEN / CLOSE
    ───────────────────────────────────────────────────── */
    openSettingsBtn.addEventListener('click', () => {
      settingsPanel.style.display = 'flex';
      requestAnimationFrame(() => settingsPanel.classList.add('visible'));
    });
    closeSettingsBtn.addEventListener('click', closeSettings);
    settingsPanel.addEventListener('click', e => { if (e.target === settingsPanel) closeSettings(); });

    function closeSettings() {
      settingsPanel.classList.remove('visible');
      setTimeout(() => { settingsPanel.style.display = 'none'; }, 400);
    }

    /* ─────────────────────────────────────────────────────
       TABS
    ───────────────────────────────────────────────────── */
    function movePill(tabEl) {
      pill.style.left  = `${tabEl.offsetLeft}px`;
      pill.style.width = `${tabEl.offsetWidth}px`;
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        offset = 0;
        movePill(tab);
        renderList();
      });
    });

    // Set pill on load
    window.addEventListener('load', () => {
      const activeEl = document.querySelector('.tab.active');
      if (activeEl) movePill(activeEl);
    });

    /* ─────────────────────────────────────────────────────
       FETCH NOTIFICATIONS FROM SUPABASE
    ───────────────────────────────────────────────────── */
    async function fetchNotifications(reset = false) {
      if (isFetching || !currentUser) return;
      isFetching = true;

      if (reset) {
        offset = 0;
        notifications = [];
      }

      try {
        let query = supabase
          .from('notifications')
          .select(`
            id,
            type,
            content,
            seen_at,
            created_at,
            post_id,
            sender_id,
            sender:profiles!notifications_sender_id_fkey(id, full_name, username, profile_photo)
          `)
          .eq('user_id', currentUser.id)
          .order('created_at', { ascending: false })
          .range(offset, offset + PAGE_SIZE - 1);

        if (activeTab !== 'all') {
          query = query.eq('type', activeTab);
        }

        const { data, error } = await query;
        if (error) { console.error('Error fetching notifications:', error); return; }

        notifications = reset ? data : [...notifications, ...data];
        offset += data.length;
        loadMoreBtn.style.display = data.length < PAGE_SIZE ? 'none' : 'block';
      } finally {
        isFetching = false;
      }
    }

    /* ─────────────────────────────────────────────────────
       RENDER LIST
    ───────────────────────────────────────────────────── */
    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1)  return 'Just now';
      if (m < 60) return `${m}m ago`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.floor(h / 24);
      if (d < 30) return `${d}d ago`;
      return new Date(dateStr).toLocaleDateString();
    }

    function notifIcon(type) {
      const map = {
        new_follower:      '👤',
        new_like:          '❤️',
        new_post:          '📸',
        new_comment:       '💬',
        new_group_message: '💬',
        comment:           '💬',
        default:           '🔔',
      };
      return map[type] || map.default;
    }

    function renderList() {
      listEl.innerHTML = '';

      if (notifications.length === 0) {
        listEl.innerHTML = `
          <div style="text-align:center;padding:3rem;color:var(--text-secondary);">
            <i class="fas fa-bell-slash" style="font-size:3rem;opacity:.4;margin-bottom:1rem;display:block;"></i>
            <p>No notifications yet</p>
          </div>`;
        return;
      }

      notifications.forEach(n => {
        const isUnread = !n.seen_at;
        const sender   = n.sender;
        const name     = sender?.full_name || 'System';
        const photo    = sender?.profile_photo;

        const avatarHtml = photo
          ? `<img class="avatar" src="${photo}" alt="${name}" onerror="this.outerHTML='<div class=\\'avatar\\'><span style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-weight:700;\\'>${getInitials(name)}</span></div>'">`
          : `<div class="avatar" style="display:flex;align-items:center;justify-content:center;font-weight:700;background:#3498db22;color:var(--text-primary);">${getInitials(name)}</div>`;

        const item = document.createElement('div');
        item.className = `notification-item${isUnread ? ' unread' : ''}`;
        item.dataset.id = n.id;
        item.innerHTML = `
          ${avatarHtml}
          <div class="content">
            <p><strong>${name}</strong> ${n.content || n.type?.replace(/_/g, ' ') || 'notification'} ${notifIcon(n.type)}</p>
            <div class="timestamp">${timeAgo(n.created_at)}</div>
          </div>
        `;

        item.addEventListener('click', () => markOneRead(n));
        listEl.appendChild(item);
      });
    }

    /* ─────────────────────────────────────────────────────
       MARK ONE AS READ
    ───────────────────────────────────────────────────── */
    async function markOneRead(notif) {
      if (notif.seen_at) return; // already read
      const ts = new Date().toISOString();
      const { error } = await supabase
        .from('notifications')
        .update({ seen_at: ts })
        .eq('id', notif.id)
        .eq('user_id', currentUser.id);

      if (error) { console.error('Error marking notification read:', error); return; }

      notif.seen_at = ts;
      renderList();
      updateBadge();
    }

    /* ─────────────────────────────────────────────────────
       MARK ALL AS READ — updates DB, then refreshes from DB
    ───────────────────────────────────────────────────── */
    markAllBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      markAllBtn.disabled = true;
      markAllBtn.textContent = 'Marking…';

      try {
        const ts = new Date().toISOString();
        const { error } = await supabase
          .from('notifications')
          .update({ seen_at: ts })
          .eq('user_id', currentUser.id)
          .is('seen_at', null);       // only unseen rows

        if (error) { console.error('Error marking all as read:', error); throw error; }

        // Re-fetch from DB to ensure UI reflects true state
        await fetchNotifications(true);
        renderList();
        updateBadge();
        showToast('All notifications marked as read', 'fa-check-circle', '#2ecc71');
      } catch (err) {
        showToast('Could not mark all as read', 'fa-exclamation-circle', '#e74c3c');
      } finally {
        markAllBtn.disabled = false;
        markAllBtn.textContent = 'Mark All Read';
      }
    });

    /* ─────────────────────────────────────────────────────
       CLEAR ALL (soft delete — marks seen + could delete rows)
    ───────────────────────────────────────────────────── */
    clearAllBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      clearAllBtn.disabled = true;
      clearAllBtn.textContent = 'Clearing…';

      try {
        const { error } = await supabase
          .from('notifications')
          .delete()
          .eq('user_id', currentUser.id);

        if (error) { console.error('Error clearing notifications:', error); throw error; }

        notifications = [];
        offset = 0;
        renderList();
        updateBadge();
        showToast('All notifications cleared', 'fa-trash-alt', '#e74c3c');
      } catch {
        showToast('Could not clear notifications', 'fa-exclamation-circle', '#e74c3c');
      } finally {
        clearAllBtn.disabled = false;
        clearAllBtn.textContent = 'Clear All';
      }
    });

    /* ─────────────────────────────────────────────────────
       LOAD MORE
    ───────────────────────────────────────────────────── */
    loadMoreBtn.addEventListener('click', async () => {
      await fetchNotifications(false);
      renderList();
    });

    /* ─────────────────────────────────────────────────────
       NOTIFICATION BADGE (bottom nav)
    ───────────────────────────────────────────────────── */
    function updateBadge() {
      const unread = notifications.filter(n => !n.seen_at).length;
      document.querySelectorAll('.notification-badge').forEach(el => {
        el.classList.toggle('visible', unread > 0);
      });
    }

    /* ─────────────────────────────────────────────────────
       REAL-TIME SUBSCRIPTION
    ───────────────────────────────────────────────────── */
    function setupRealtime() {
      supabase
        .channel(`notif-page-${currentUser.id}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'notifications',
          filter: `user_id=eq.${currentUser.id}`
        }, async () => {
          await fetchNotifications(true);
          renderList();
          updateBadge();
        })
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'notifications',
          filter: `user_id=eq.${currentUser.id}`
        }, async () => {
          await fetchNotifications(true);
          renderList();
          updateBadge();
        })
        .subscribe((status, err) => {
          if (status === 'CHANNEL_ERROR') console.error('Notifications realtime error:', err);
        });
    }

    /* ─────────────────────────────────────────────────────
       DARK MODE — sync with localStorage from profile/dashboard
    ───────────────────────────────────────────────────── */
    function applyTheme() {
      const theme = localStorage.getItem('peerloom-theme') || 'light';
      if (theme === 'dark') {
        document.body.classList.add('dark');
      } else {
        document.body.classList.remove('dark');
      }
    }

    /* ─────────────────────────────────────────────────────
       INIT
    ───────────────────────────────────────────────────── */
    async function init() {
      applyTheme();
      initSettingsToggles();

      const { data: { user }, error: authErr } = await supabase.auth.getUser();
      if (authErr || !user) {
        console.error('Auth error:', authErr);
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;

      listEl.innerHTML = `
        <div style="text-align:center;padding:3rem;">
          <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--accent);"></i>
        </div>`;

      await fetchNotifications(true);
      renderList();
      updateBadge();
      setupRealtime();
    }

    init();
  </script>
</body>
</html>
